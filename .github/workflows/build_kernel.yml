# Build LineageOS kernel for OnePlus 6 with KernelSU-Next + SUSFS v1.5.12 + SUS_MAP
# Based on the proven approach from Andrey0800770/samsung_sdm845-kernel (ksu+susfs branch)
# KernelSU-Next source: sidex15/KernelSU-Next commit 13b1dfd (v1.1.1 with SUSFS v1.5.12)
name: Build LineageOS Kernel with KernelSU-Next + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        SUSFS: ["true", "false"]
        KPM: ["true", "false"]
        ZRAM: ["true", "false"]
      fail-fast: false

    name: "Build (SUSFS: ${{ matrix.SUSFS }}, KPM: ${{ matrix.KPM }}, ZRAM: ${{ matrix.ZRAM }})"

    steps:
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get upgrade -y
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils make python3 libssl-dev build-essential bc bison flex unzip \
            libssl-dev ca-certificates xz-utils mkbootimg cpio device-tree-compiler \
            git git-lfs wget gzip

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      - name: Checkout this repo (patches and scripts)
        uses: actions/checkout@v4
        with:
          ref: master
          path: repo

      - name: Checkout LineageOS kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_oneplus_sdm845
          ref: lineage-22.2
          path: kernel_workspace/kernel_platform

      - name: Remove -dirty suffix from kernel version
        run: |
          cd kernel_workspace/kernel_platform
          sed -i 's/ -dirty//g' scripts/setlocalversion
          sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' scripts/setlocalversion
          git add -A
          git commit -m "Force remove -dirty suffix from kernel version"

      # =========================================================================
      # KernelSU-Next integration
      # Uses sidex15/KernelSU-Next which has:
      #   - Native kernel 4.9 compat (kernel_compat.c)
      #   - SUSFS v1.5.12 built into the driver (core_hook.c, sucompat.c)
      #   - SUS_MAP handler already in driver code
      #   - path_umount/can_umount/get_cred_rcu injected via Makefile at build time
      # =========================================================================
      - name: Add KernelSU-Next (sidex15 fork, v1.1.1 + SUSFS v1.5.12)
        run: |
          cd kernel_workspace/kernel_platform

          # Clone sidex15/KernelSU-Next at the exact commit Andrey0800770 uses
          # This is v1.1.1 with SUSFS v1.5.12 integrated into the driver
          git clone https://github.com/sidex15/KernelSU-Next KernelSU-Next
          cd KernelSU-Next
          git checkout 13b1dfd6e2f1b7b353e774ad8dbc66012450d80f
          echo "KernelSU-Next checked out at: $(git log --oneline -1)"

          # Link KernelSU-Next/kernel/ into drivers/kernelsu/
          cd ../drivers
          ln -sf "$(realpath --relative-to="$(pwd)" "../KernelSU-Next/kernel")" "kernelsu"
          echo "Symlink created: drivers/kernelsu -> $(readlink kernelsu)"

          # Add KernelSU to drivers/Makefile
          if ! grep -q "kernelsu" Makefile; then
            printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> Makefile
            echo "Added kernelsu to drivers/Makefile"
          fi

          # Add KernelSU to drivers/Kconfig
          if ! grep -q 'drivers/kernelsu/Kconfig' Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' Kconfig
            echo "Added kernelsu/Kconfig to drivers/Kconfig"
          fi

          cd ..

          # Calculate and set KSU version
          cd KernelSU-Next
          KSU_VERSION=$(expr $(/usr/bin/git rev-list --count HEAD) "+" 10606)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KernelSU-Next version tag: $(git describe --tags --always)"
          echo "KernelSU version number: $KSU_VERSION"

      # =========================================================================
      # Kernel-side patches (manual hooks for non-GKI kernel)
      # These add the hook points in the kernel source that KernelSU-Next calls
      # =========================================================================
      - name: Apply kernel manual hook patches
        run: |
          cd kernel_workspace/kernel_platform
          echo "== Applying syshook.patch (manual hooks for execve, vfs_read, etc.) =="
          patch -p1 < ../../repo/syshook.patch
          echo "== Applying selinux-fix.patch (NNP/nosuid bypass for su context) =="
          patch -p1 < ../../repo/selinux-fix.patch

      # =========================================================================
      # Backport: seccomp filter_count
      # KernelSU-Next requires struct seccomp to have atomic_t filter_count
      # which is missing on kernel 4.9
      # =========================================================================
      - name: Backport seccomp filter_count
        run: |
          cd kernel_workspace/kernel_platform
          SECCOMP_H="include/linux/seccomp.h"
          if ! grep -q "filter_count" "$SECCOMP_H"; then
            # Add filter_count field to struct seccomp (before the closing brace)
            sed -i '/^struct seccomp {/,/^};/{
              /^};/i\\tatomic_t filter_count;
            }' "$SECCOMP_H"
            echo "Added filter_count to struct seccomp"
          else
            echo "filter_count already present in seccomp.h"
          fi

      # =========================================================================
      # SUSFS kernel-side integration
      # Step 1: Apply ShirkNeko/susfs4ksu kernel-4.9 patch for kernel hooks
      #         (modifies fs/namei.c, fs/namespace.c, fs/stat.c, etc.)
      # Step 2: Replace kernel-side SUSFS source files with Andrey0800770's
      #         v1.5.12 versions (which match the driver's v1.5.12 API)
      # Step 3: Add SUS_MAP hooks to task_mmu.c and base.c
      # =========================================================================
      - name: Apply SUSFS kernel-side patches
        if: ${{ matrix.SUSFS == 'true' }}
        run: |
          cd kernel_workspace

          # Clone susfs4ksu for the kernel-side SUSFS source files
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b kernel-4.9
          cd kernel_platform

          echo "== Step 1: Applying SUSFS kernel integration patch =="
          # Use our repo's susfs-kernel.patch (tested against LineageOS sdm845)
          # This modifies: fs/Makefile, fs/dcache.c, fs/namei.c, fs/namespace.c,
          # fs/notify/fdinfo.c, fs/proc/cmdline.c, fs/proc/fd.c, fs/proc/task_mmu.c,
          # fs/proc_namespace.c, fs/readdir.c, fs/stat.c, fs/statfs.c,
          # include/linux/mount.h, include/linux/sched.h, kernel/kallsyms.c, kernel/sys.c
          # Also includes overlayfs patches
          patch -p1 -F3 < ../../repo/susfs-kernel.patch

          echo "== Step 2: Copying SUSFS kernel source files (v1.5.9 base) =="
          cp ../susfs4ksu/kernel_patches/fs/susfs.c ./fs/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs.h ./include/linux/
          cp ../susfs4ksu/kernel_patches/include/linux/susfs_def.h ./include/linux/
          # sus_su files
          if [ -f ../susfs4ksu/kernel_patches/fs/sus_su.c ]; then
            cp ../susfs4ksu/kernel_patches/fs/sus_su.c ./fs/
          fi
          if [ -f ../susfs4ksu/kernel_patches/include/linux/sus_su.h ]; then
            cp ../susfs4ksu/kernel_patches/include/linux/sus_su.h ./include/linux/
          fi

          echo "== Step 3: Replacing SUSFS source files with Andrey0800770's v1.5.12 =="
          # The KernelSU-Next driver at commit 13b1dfd expects SUSFS v1.5.12 API
          # Download Andrey0800770's v1.5.12 kernel-side files which match
          ANDREY_BASE="https://raw.githubusercontent.com/Andrey0800770/samsung_sdm845-kernel/ksu%2Bsusfs"
          curl -sL "${ANDREY_BASE}/fs/susfs.c" -o ./fs/susfs.c
          curl -sL "${ANDREY_BASE}/include/linux/susfs.h" -o ./include/linux/susfs.h
          curl -sL "${ANDREY_BASE}/include/linux/susfs_def.h" -o ./include/linux/susfs_def.h

          echo "== Step 4: Fixing v1.5.9 -> v1.5.12 API in kernel hook files =="
          # The v1.5.9 patch modified kernel files using old-style API.
          # v1.5.12 changed:
          #   inode->i_state & INODE_STATE_XXX  ->  inode->i_mapping->flags & BIT_XXX
          #   current->susfs_task_state & TASK_STRUCT_NON_ROOT_USER_APP_PROC
          #     ->  susfs_is_current_proc_umounted()

          # Fix inode->i_state -> inode->i_mapping->flags across all kernel files
          SUSFS_FILES="fs/dcache.c fs/namei.c fs/stat.c fs/statfs.c fs/readdir.c
                       fs/proc/task_mmu.c fs/proc/fd.c fs/proc_namespace.c
                       fs/notify/fdinfo.c kernel/sys.c kernel/kallsyms.c
                       fs/overlayfs/inode.c fs/overlayfs/readdir.c fs/overlayfs/super.c"
          for f in $SUSFS_FILES; do
            if [ -f "$f" ] && grep -q "INODE_STATE_" "$f"; then
              sed -i 's/->i_state & INODE_STATE_SUS_PATH/->i_mapping->flags \& BIT_SUS_PATH/g' "$f"
              sed -i 's/->i_state & INODE_STATE_SUS_MOUNT/->i_mapping->flags \& BIT_SUS_MOUNT/g' "$f"
              sed -i 's/->i_state & INODE_STATE_SUS_KSTAT/->i_mapping->flags \& BIT_SUS_KSTAT/g' "$f"
              sed -i 's/->i_state & INODE_STATE_OPEN_REDIRECT/->i_mapping->flags \& BIT_OPEN_REDIRECT/g' "$f"
              echo "  Fixed INODE_STATE -> BIT_ in $f"
            fi
          done

          # Fix task_state check -> thread_info flag check
          TASK_FILES="fs/dcache.c fs/namei.c fs/readdir.c fs/stat.c fs/statfs.c
                     fs/proc/task_mmu.c fs/proc/fd.c fs/notify/fdinfo.c
                     fs/proc_namespace.c kernel/sys.c kernel/kallsyms.c"
          for f in $TASK_FILES; do
            if [ -f "$f" ] && grep -q "TASK_STRUCT_NON_ROOT_USER_APP_PROC" "$f"; then
              sed -i 's/likely(current->susfs_task_state & TASK_STRUCT_NON_ROOT_USER_APP_PROC)/susfs_is_current_proc_umounted()/g' "$f"
              echo "  Fixed TASK_STRUCT -> susfs_is_current_proc_umounted() in $f"
            fi
          done

          # Verify the versions
          echo "SUSFS version: $(grep 'SUSFS_VERSION' include/linux/susfs.h | head -1)"
          echo "SUS_MAP in susfs_def.h: $(grep -c 'CMD_SUSFS_ADD_SUS_MAP' include/linux/susfs_def.h)"

          # Verify no remaining v1.5.9 references in source files
          REMAINING=$(grep -rl "INODE_STATE_SUS_PATH\|INODE_STATE_SUS_MOUNT\|INODE_STATE_SUS_KSTAT\|INODE_STATE_OPEN_REDIRECT\|TASK_STRUCT_NON_ROOT_USER_APP_PROC" fs/ include/ kernel/ 2>/dev/null || true)
          if [ -n "$REMAINING" ]; then
            echo "WARNING: Remaining v1.5.9 references in: $REMAINING"
          else
            echo "All v1.5.9 API references successfully migrated to v1.5.12"
          fi

          echo "== Step 5: Adding missing v1.5.12 function stubs =="
          # Some functions are referenced by kernel hooks but not defined in susfs.c
          # Add stubs to fs/susfs.c for any missing symbols
          SUSC="./fs/susfs.c"
          # Force-add stubs at end of file (won't conflict even if name appears elsewhere)
          cat >> "$SUSC" << 'STUBS'

          /* v1.5.12 stubs for symbols referenced by kernel hooks */
          #ifndef SUSFS_STUB_GUARD
          #define SUSFS_STUB_GUARD
          bool susfs_is_avc_log_spoofing_enabled = false;
          int __weak susfs_sus_ino_for_filldir64(unsigned long ino) { return 0; }
          void __weak susfs_hide_sus_mnts_for_all_procs(void) { }
          #endif
          STUBS
          echo "  Added v1.5.12 function stubs"

          echo "== Step 6: Download Andrey0800770's task_mmu.c with proper SUS_MAP hooks =="
          # Andrey's task_mmu.c has the correct v1.5.12 SUS_MAP implementation
          # (12 SUS_MAP references, properly integrated). Our add_sus_map_kernel.sh
          # creates an incompatible v1.5.9-style implementation.
          ANDREY_BASE="https://raw.githubusercontent.com/Andrey0800770/samsung_sdm845-kernel/ksu%2Bsusfs"
          curl -sL "${ANDREY_BASE}/fs/proc/task_mmu.c" -o ./fs/proc/task_mmu.c
          curl -sL "${ANDREY_BASE}/fs/proc/base.c" -o ./fs/proc/base.c
          echo "  Downloaded Andrey's task_mmu.c + base.c (v1.5.12 SUS_MAP)"
          echo "  SUS_MAP refs in task_mmu.c: $(grep -c SUS_MAP fs/proc/task_mmu.c)"
          echo "  SUS_MAP refs in base.c: $(grep -c SUS_MAP fs/proc/base.c)"

          echo "== SUSFS kernel-side integration complete =="

      - name: Apply KPM patches
        if: ${{ matrix.KPM == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform
          wget 'https://raw.githubusercontent.com/MediaTek-Labs/common-kernel-4.19/refs/heads/master/include/linux/set_memory.h' -O include/linux/set_memory.h
          patch -p1 < ../../repo/kpm.patch

      - name: Apply ZRAM patches
        if: ${{ matrix.ZRAM == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform
          cp -r ../../repo/zram/include/* ./include/linux/
          cp -r ../../repo/zram/crypto/* ./crypto/
          cp -r ../../repo/zram/lib/lz4kd/ ./lib/
          patch -p1 < ../../repo/zram/zram.patch

      # =========================================================================
      # Kernel configuration
      # =========================================================================
      - name: Configure kernel
        run: |
          cd kernel_workspace/kernel_platform
          CONFIG_FILE=./arch/arm64/configs/enchilada_defconfig

          # KernelSU-Next config
          echo "CONFIG_KSU=y" >> "$CONFIG_FILE"

          # KPM config
          if [ "${{ matrix.KPM }}" = "true" ]; then
            echo "CONFIG_KPM=y" >> "$CONFIG_FILE"
            echo "CONFIG_KALLSYMS=y" >> "$CONFIG_FILE"
            echo "CONFIG_KALLSYMS_ALL=y" >> "$CONFIG_FILE"
          else
            echo "CONFIG_KPM=n" >> "$CONFIG_FILE"
          fi

          # Manual hooks (non-GKI kernel, no kprobes)
          echo "CONFIG_KSU_KPROBES_HOOK=n" >> "$CONFIG_FILE"

          # ZRAM config
          if [ "${{ matrix.ZRAM }}" = "true" ]; then
            echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
            echo "CONFIG_ZRAM=y" >> "$CONFIG_FILE"
            echo "CONFIG_MODULE_SIG=n" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4KD=y" >> "$CONFIG_FILE"
            echo "CONFIG_ZRAM_DEF_COMP_LZ4KD=y" >> "$CONFIG_FILE"
          fi

          # SUSFS config (all features including SUS_MAP)
          if [ "${{ matrix.SUSFS }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> "$CONFIG_FILE"
          fi

      # =========================================================================
      # Build
      # =========================================================================
      - name: Download clang compiler
        run: |
          wget https://github.com/llvm/llvm-project/releases/download/llvmorg-14.0.0/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz
          tar xf clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04.tar.xz

      - name: Build kernel
        run: |
          export PATH=$(pwd)/clang+llvm-14.0.0-x86_64-linux-gnu-ubuntu-18.04/bin/:$PATH
          cd kernel_workspace/kernel_platform
          make O=out $KERNEL_DEFCONFIG
          # Fix unused variable 'error' in core_hook.c (around line 698)
          CORE_HOOK="KernelSU-Next/kernel/core_hook.c"
          if [ -f "$CORE_HOOK" ]; then
            # Show the actual line for debugging
            echo "=== core_hook.c line 695-700 ==="
            sed -n '695,700p' "$CORE_HOOK"
            # Broad match: any line with 'int error' gets __maybe_unused
            sed -i 's/int error/int __maybe_unused error/g' "$CORE_HOOK"
            echo "Fixed unused variable in core_hook.c"
          fi
          make -j$(nproc --all) O=out ARCH=arm64 CC="ccache clang" CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1
        env:
          KERNEL_DEFCONFIG: "enchilada_defconfig"
          ARCH: arm64
          SUBARCH: arm64

      # =========================================================================
      # Package
      # =========================================================================
      - name: Download AnyKernel3
        uses: actions/checkout@v4
        with:
          repository: osm0sis/AnyKernel3
          ref: master
          path: AnyKernel3

      - name: Extract kernel image
        run: |
          cd kernel_workspace/kernel_platform
          mv out/arch/arm64/boot/Image.gz-dtb Image.gz-dtb

      - name: Apply KPM post-processing
        if: ${{ matrix.KPM == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU_patch/refs/heads/main/kpm/patch_linux" -o patch_linux
          chmod +x patch_linux
          mv Image.gz-dtb Image.gz
          gzip -d Image.gz || true
          ./patch_linux
          rm -f Image
          mv oImage Image

      - name: Configure AnyKernel3
        run: |
          if [ "${{ matrix.KPM }}" = "true" ]; then
            cp $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/Image $GITHUB_WORKSPACE/AnyKernel3/Image
          else
            cp $GITHUB_WORKSPACE/kernel_workspace/kernel_platform/Image.gz-dtb $GITHUB_WORKSPACE/AnyKernel3/Image.gz-dtb
          fi
          cd $GITHUB_WORKSPACE/AnyKernel3
          rm anykernel.sh
          cp -f ../repo/anykernel.sh .

      - name: Generate package name
        run: |
          KSU_VERSION=$(echo $KSU_VERSION)
          DATE=$(date +'%y%m%d')
          if [ "${{ matrix.SUSFS }}" = "true" ]; then
            SUSFS_TAG="_SUSFS"
          else
            SUSFS_TAG=""
          fi
          if [ "${{ matrix.KPM }}" = "true" ]; then
            KPM_TAG="_KPM"
          else
            KPM_TAG=""
          fi
          if [ "${{ matrix.ZRAM }}" = "true" ]; then
            ZRAM_TAG="_ZRAM"
          else
            ZRAM_TAG=""
          fi
          PACKAGE_NAME="Lineage_OnePlus6_KSU-Next_${KSU_VERSION}${SUSFS_TAG}${KPM_TAG}${ZRAM_TAG}_${DATE}"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
        env:
          KSU_VERSION: ${{ env.KSU_VERSION }}

      - name: Upload kernel package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ./AnyKernel3/*
        env:
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
